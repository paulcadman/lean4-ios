name: Sim App CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sim-app-builds:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Compute cache keys
        id: cache-keys
        run: |
          echo "lean4_sha=$(git -C lean4 rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "xcode_version=$(xcodebuild -version | tr '\n' ' ' | sed 's/  */ /g; s/ /-/g')" >> "$GITHUB_OUTPUT"

      - name: install elan
        run: |
            set -o pipefail
            curl -sSfL https://github.com/leanprover/elan/releases/download/v3.1.1/elan-aarch64-apple-darwin.tar.gz | tar xz
            ./elan-init -y --no-modify-path --default-toolchain "$(cat lean-toolchain)"
            echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Homebrew dependencies
        run: |
          brew install cmake zstd

      - name: Install Rust iOS targets
        run: |
          rustup target add aarch64-apple-ios-sim aarch64-apple-ios

      - name: Cache Lean iOS build artifacts
        uses: actions/cache@v4
        with:
          path: |
            build/lean4-arm64_apple_ios16_0_simulator-runtime/include
            build/lean4-arm64_apple_ios16_0_simulator-runtime/lib/lean
            build/ios-lean-arm64_apple_ios16_0_simulator/lib
          key: ${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-keys.outputs.xcode_version }}-lean-ios-sim-${{ steps.cache-keys.outputs.lean4_sha }}-${{ hashFiles('lean-toolchain', 'Makefile', 'app-common/Makefile.common', 'scripts/ios-*.sh') }}

      - name: Build example-sdl-app sim app
        run: make -C example-sdl-app sim-app

      - name: Build example-flappy sim app
        run: make -C example-flappy sim-app

      - name: Build example-bus-times sim app
        run: make -C example-bus-times sim-app

      - name: Build example-lean-ios-runner sim app
        run: make -C example-lean-ios-runner sim-app
