name: Sim App CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  sim-app-builds:
    runs-on: macos-latest
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_COMPILERCHECK: content
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: 2G
      CCACHE: ccache

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Compute cache keys
        id: cache-keys
        run: |
          echo "lean4_sha=$(git -C lean4 rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "xcode_version=$(xcodebuild -version | tr '\n' ' ' | sed 's/  */ /g; s/ /-/g')" >> "$GITHUB_OUTPUT"

      - name: install elan
        run: |
            set -o pipefail
            curl -sSfL https://github.com/leanprover/elan/releases/download/v3.1.1/elan-aarch64-apple-darwin.tar.gz | tar xz
            ./elan-init -y --no-modify-path --default-toolchain "$(cat lean-toolchain)"
            echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Install Homebrew dependencies
        run: |
          brew install cmake ccache

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-keys.outputs.xcode_version }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-${{ steps.cache-keys.outputs.xcode_version }}-ccache-

      - name: Install Rust iOS targets
        run: |
          rustup target add aarch64-apple-ios-sim aarch64-apple-ios

      - name: Build example-sdl-app sim app
        run: make -C example-sdl-app sim-app

      - name: Build example-flappy sim app
        run: make -C example-flappy sim-app

      - name: Build example-bus-times sim app
        run: make -C example-bus-times sim-app

      - name: Build example-elab-app sim app
        run: make -C example-elab-app sim-app

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats
