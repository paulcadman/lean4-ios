name = "example_flappy"
version = "0.1.0"
defaultTargets = ["ExampleFlappyApp"]

[leanOptions]
autoImplicit = false

[[require]]
name = "sdl_bindings"
path = "../sdl-bindings"

[[require]]
name = "flappy"
git = "https://github.com/paulcadman/flappy.git"
rev = "0a31d8279d9f0599a703388ad225e37816fc96a3"

[[lean_lib]]
name = "ExampleFlappyApp"
srcDir = "lean"
roots = ["ExampleFlappy"]
defaultFacets = ["static"]
